name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api]'

      - name: Lint
        run: ruff check specter tests

      - name: Test
        run: pytest -v

      - name: Smoke import
        run: |
          python -c "import specter; from specter.apts import assess_self; r = assess_self(); print(f'APTS headline: {r.headline_score:.1%}')"
