<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 240"
     role="img"
     aria-label="Rachel Zane — paralegal who runs the case">
  <title>Rachel Zane — paralegal</title>
  <desc>Pop-art portrait: long dark wavy hair to shoulder, blazer, pearl-dot earring, clipboard corner. Crimson and cream ray-burst.</desc>

  <defs>
    <style>
      .ink   { fill: none; stroke: #0E0F12; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .ink-2 { fill: none; stroke: #0E0F12; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .ink-thick { fill: none; stroke: #0E0F12; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .skin  { fill: #EFC4A0; }
      .skin-shade { fill: #C9956A; }
      .hair  { fill: #2A1A12; }
      .hair-hi { fill: #4A2E20; }
      .blazer { fill: #A8324A; }
      .blazer-shade { fill: #7B1F33; }
      .blouse { fill: #F5E6E0; }
      .blush { fill: #E8341E; opacity: 0.5; }
      .lip { fill: #C92A40; }
    </style>

    <pattern id="rz-halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.1" fill="#0E0F12" opacity="0.85"/>
    </pattern>

    <clipPath id="rz-circle">
      <circle cx="120" cy="120" r="116"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rz-circle)">
    <rect x="0" y="0" width="240" height="240" fill="#F5E6E0"/>

    <g transform="translate(120 120)">
      <polygon points="0,0 -260,-90 -260,-30"  fill="#A8324A"/>
      <polygon points="0,0 -260,-30 -260,30"   fill="#F5E6E0"/>
      <polygon points="0,0 -260,30  -260,90"   fill="#A8324A"/>
      <polygon points="0,0 -260,90  -90,260"   fill="#E8341E"/>
      <polygon points="0,0  90,260  260,90"    fill="#A8324A"/>
      <polygon points="0,0  260,90  260,30"    fill="#F5E6E0"/>
      <polygon points="0,0  260,30  260,-30"   fill="#F08C2A"/>
      <polygon points="0,0  260,-30 260,-90"   fill="#E8341E"/>
      <polygon points="0,0  260,-90 90,-260"   fill="#F5E6E0"/>
      <polygon points="0,0  90,-260 -90,-260"  fill="#A8324A"/>
      <polygon points="0,0 -90,-260 -260,-90"  fill="#F5E6E0"/>
    </g>

    <circle cx="120" cy="118" r="84" fill="#FBE9C5" opacity="0.7"/>
    <rect x="0" y="0" width="240" height="240" fill="url(#rz-halftone)" opacity="0.16"/>

    <!-- clipboard corner peeking up from bottom-left -->
    <g transform="translate(8 196) rotate(-12)">
      <rect x="0" y="0" width="56" height="60" fill="#F2C531" stroke="#0E0F12" stroke-width="3"/>
      <rect x="18" y="-6" width="20" height="10" fill="#A8324A" stroke="#0E0F12" stroke-width="2"/>
      <line x1="6" y1="14" x2="50" y2="14" stroke="#0E0F12" stroke-width="1.5"/>
      <line x1="6" y1="22" x2="50" y2="22" stroke="#0E0F12" stroke-width="1.5"/>
      <line x1="6" y1="30" x2="40" y2="30" stroke="#0E0F12" stroke-width="1.5"/>
      <line x1="6" y1="38" x2="46" y2="38" stroke="#0E0F12" stroke-width="1.5"/>
    </g>
  </g>

  <circle cx="120" cy="120" r="116" fill="none" stroke="#0E0F12" stroke-width="6"/>

  <g>
    <!-- hair: long dark waves down past shoulders, framing -->
    <path class="hair" d="
      M 70 120
      C 60 150, 56 200, 60 240
      L 96 240
      C 92 220, 92 200, 96 180
      Z"/>
    <path class="hair" d="
      M 170 120
      C 180 150, 184 200, 180 240
      L 144 240
      C 148 220, 148 200, 144 180
      Z"/>

    <!-- blazer -->
    <path class="blazer" d="M 30 240 L 30 200 C 38 180, 62 168, 80 164 L 102 158 L 138 158 L 160 164 C 178 168, 202 180, 210 200 L 210 240 Z"/>
    <path class="blazer-shade" d="M 30 240 L 30 200 C 38 180, 56 170, 70 168 L 70 240 Z"/>

    <!-- blouse / cream V -->
    <path class="blouse" d="M 100 162 L 120 196 L 140 162 L 138 240 L 102 240 Z"/>
    <path class="ink-2" d="M 100 162 L 120 196 L 140 162"/>

    <!-- lapels -->
    <path class="ink-thick" d="M 100 162 L 80 178"/>
    <path class="ink-thick" d="M 140 162 L 160 178"/>

    <!-- statement bead necklace -->
    <circle cx="120" cy="186" r="5" fill="#F2C531" stroke="#0E0F12" stroke-width="2"/>
    <path class="ink-2" d="M 100 174 C 110 184, 130 184, 140 174"/>

    <!-- neck -->
    <path class="skin" d="M 110 144 L 130 144 L 132 164 L 108 164 Z"/>
    <path class="skin-shade" d="M 110 156 L 130 156 L 130 164 L 110 164 Z"/>
    <path class="ink-2" d="M 110 144 L 108 164"/>
    <path class="ink-2" d="M 130 144 L 132 164"/>

    <!-- face oval -->
    <path class="skin" d="M 90 96 C 90 74, 104 60, 120 60 C 136 60, 150 74, 150 96 L 150 124 C 150 140, 136 152, 120 152 C 104 152, 90 140, 90 124 Z"/>

    <!-- hair top: side-parted, soft waves -->
    <path class="hair" d="
      M 78 100
      C 72 70, 92 44, 122 44
      C 152 44, 168 64, 166 96
      C 162 84, 152 76, 140 74
      C 124 72, 110 78, 102 90
      C 96 100, 92 110, 90 116
      L 86 116
      C 80 110, 78 104, 78 100 Z"/>
    <path class="hair-hi" d="M 100 56 C 122 50, 142 54, 156 68 C 138 60, 118 62, 104 70 Z"/>
    <path class="ink-thick" d="M 102 60 C 124 76, 148 78, 162 70"/>
    <path class="ink-2" d="M 92 100 C 100 84, 116 76, 132 78"/>

    <!-- side hair sweeping down past cheek -->
    <path class="hair" d="M 88 116 C 84 138, 82 158, 84 176 C 80 162, 78 142, 80 124 Z"/>
    <path class="hair" d="M 152 116 C 156 138, 158 158, 156 176 C 160 162, 162 142, 160 124 Z"/>

    <!-- pearl earring -->
    <circle cx="86" cy="124" r="3" fill="#F5E6E0" stroke="#0E0F12" stroke-width="1.5"/>

    <!-- eyebrows -->
    <path class="ink-thick" d="M 100 102 C 106 99, 113 99, 117 102"/>
    <path class="ink-thick" d="M 123 102 C 127 99, 134 99, 140 102"/>

    <!-- eyes: warm, attentive -->
    <ellipse cx="106" cy="112" rx="4" ry="3" fill="#FBFAF4" stroke="#0E0F12" stroke-width="1.5"/>
    <ellipse cx="134" cy="112" rx="4" ry="3" fill="#FBFAF4" stroke="#0E0F12" stroke-width="1.5"/>
    <circle cx="106" cy="112" r="1.6" fill="#0E0F12"/>
    <circle cx="134" cy="112" r="1.6" fill="#0E0F12"/>
    <!-- lashes -->
    <path class="ink-2" d="M 102 110 L 100 108"/>
    <path class="ink-2" d="M 110 110 L 112 108"/>
    <path class="ink-2" d="M 130 110 L 128 108"/>
    <path class="ink-2" d="M 138 110 L 140 108"/>

    <!-- nose -->
    <path class="ink-2" d="M 120 116 L 117 126 L 123 128"/>

    <!-- mouth: warm half-smile, lipstick -->
    <path class="lip" d="M 110 134 C 116 138, 124 138, 130 134 C 124 142, 116 142, 110 134 Z"/>
    <path class="ink-thick" d="M 110 134 C 116 142, 124 142, 130 134"/>

    <!-- blush -->
    <ellipse class="blush" cx="100" cy="126" rx="6" ry="3"/>
    <ellipse class="blush" cx="140" cy="126" rx="6" ry="3"/>

    <!-- face outline -->
    <path class="ink-thick" d="M 90 96 C 90 74, 104 60, 120 60 C 136 60, 150 74, 150 96 L 150 124 C 150 140, 136 152, 120 152 C 104 152, 90 140, 90 124 Z"/>

    <!-- jacket bottom seam -->
    <path class="ink-thick" d="M 30 240 C 70 222, 170 222, 210 240"/>
  </g>

  <g transform="translate(200 50)">
    <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z"
          fill="#F2C531" stroke="#0E0F12" stroke-width="2"/>
  </g>
</svg>
