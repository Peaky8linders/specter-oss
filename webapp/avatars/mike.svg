    <path class="hair" d="M 80 88 C 78 60, 100 46, 122 46 C 146 46, 160 60, 160 86 L 158 96 C 152 80, 134 72, 118 78 C 106 82, 96 92, 92 102 L 86 100 C 82 98, 80 94, 80 88 Z"/>
    <path class="hair-hi" d="M 102 60 C 120 54, 142 56, 154 70 C 138 64, 122 66, 110 72 Z"/>
    <path class="ink-thick" d="M 100 64 C 122 78, 142 78, 156 70"/>
    <path class="ink-2" d="M 92 88 C 102 78, 116 76, 130 76"/>

    <path class="skin" d="M 86 104 C 82 106, 82 114, 86 118 L 90 116 Z"/>
    <path class="ink-2" d="M 86 104 C 82 106, 82 114, 86 118"/>

    <path class="ink-thick" d="M 98 102 C 104 100, 112 100, 116 102"/>
    <path class="ink-thick" d="M 124 102 C 128 100, 136 100, 142 102"/>

    <ellipse cx="106" cy="112" rx="4" ry="3" fill="#FBFAF4" stroke="#0E0F12" stroke-width="1.5"/>
    <ellipse cx="134" cy="112" rx="4" ry="3" fill="#FBFAF4" stroke="#0E0F12" stroke-width="1.5"/>
    <circle cx="106" cy="112" r="1.6" fill="#0E0F12"/>
    <circle cx="134" cy="112" r="1.6" fill="#0E0F12"/>

    <path class="ink-2" d="M 120 114 L 117 126 L 123 128"/>

    <path class="ink-thick" d="M 108 136 C 118 142, 128 142, 134 136"/>
    <path class="ink-2" d="M 110 138 L 132 138"/>

    <ellipse class="blush" cx="98"  cy="128" rx="6" ry="3"/>
    <ellipse class="blush" cx="142" cy="128" rx="6" ry="3"/>

    <path class="ink-thick" d="M 88 96 C 88 74, 104 60, 120 60 C 136 60, 152 74, 152 96 L 152 124 C 152 140, 138 152, 120 152 C 102 152, 88 140, 88 124 Z"/>
    <path class="ink-thick" d="M 80 88 C 78 60, 100 46, 122 46 C 146 46, 160 60, 160 86"/>

    <path class="ink-thick" d="M 30 240 C 70 222, 170 222, 210 240"/>
