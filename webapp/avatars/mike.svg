<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 240"
     role="img"
     aria-label="Mike Ross — photographic-memory associate">
  <title>Mike Ross — associate</title>
  <desc>Pop-art portrait: younger man with light side-parted hair, loose tie, mid-blue shirt, holding a stack of articles. Cobalt and sky-blue ray-burst.</desc>

  <defs>
    <style>
      .ink   { fill: none; stroke: #0E0F12; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .ink-2 { fill: none; stroke: #0E0F12; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
      .ink-thick { fill: none; stroke: #0E0F12; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .skin  { fill: #F4D2B0; }
      .skin-shade { fill: #D9A574; }
      .hair  { fill: #C58A3A; }
      .hair-hi { fill: #E8B964; }
      .suit  { fill: #1B3A6B; }
      .suit-shade { fill: #102648; }
      .shirt { fill: #6CB4EE; }
      .shirt-shade { fill: #4490C9; }
      .tie   { fill: #1F3559; }
      .blush { fill: #E8341E; opacity: 0.45; }
    </style>

    <pattern id="mk-halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.1" fill="#0E0F12" opacity="0.85"/>
    </pattern>

    <clipPath id="mk-circle">
      <circle cx="120" cy="120" r="116"/>
    </clipPath>
  </defs>

  <g clip-path="url(#mk-circle)">
    <rect x="0" y="0" width="240" height="240" fill="#D6ECFF"/>
    <g transform="translate(120 120)">
      <polygon points="0,0 -260,-90 -260,-30"  fill="#22A4D4"/>
      <polygon points="0,0 -260,-30 -260,30"   fill="#6CB4EE"/>
      <polygon points="0,0 -260,30  -260,90"   fill="#1B3A6B"/>
      <polygon points="0,0 -260,90  -90,260"   fill="#22A4D4"/>
      <polygon points="0,0  90,260  260,90"    fill="#1B3A6B"/>
      <polygon points="0,0  260,90  260,30"    fill="#6CB4EE"/>
      <polygon points="0,0  260,30  260,-30"   fill="#F2C531"/>
      <polygon points="0,0  260,-30 260,-90"   fill="#22A4D4"/>
      <polygon points="0,0  260,-90 90,-260"   fill="#6CB4EE"/>
      <polygon points="0,0  90,-260 -90,-260"  fill="#1B3A6B"/>
      <polygon points="0,0 -90,-260 -260,-90"  fill="#6CB4EE"/>
    </g>

    <circle cx="120" cy="118" r="84" fill="#FBE9C5" opacity="0.75"/>
    <rect x="0" y="0" width="240" height="240" fill="url(#mk-halftone)" opacity="0.16"/>

    <g transform="translate(178 168)">
      <rect x="0"   y="0"  width="40" height="10" fill="#A03A2C" stroke="#0E0F12" stroke-width="2"/>
      <rect x="-2"  y="10" width="44" height="10" fill="#F2C531" stroke="#0E0F12" stroke-width="2"/>
      <rect x="2"   y="20" width="40" height="10" fill="#1F8A4C" stroke="#0E0F12" stroke-width="2"/>
      <text x="20" y="8"  font-family="Impact, sans-serif" font-size="7" fill="#0E0F12" text-anchor="middle">ART. 13</text>
      <text x="20" y="18" font-family="Impact, sans-serif" font-size="7" fill="#0E0F12" text-anchor="middle">ART. 26</text>
      <text x="22" y="28" font-family="Impact, sans-serif" font-size="7" fill="#0E0F12" text-anchor="middle">ART. 27</text>
    </g>
  </g>

  <circle cx="120" cy="120" r="116" fill="none" stroke="#0E0F12" stroke-width="6"/>

